name: YouTube Downloader (Stable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp & ffmpeg
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download video with cookies
        run: |
          if [ -n "${{ secrets.COOKIES }}" ]; then
            echo "${{ secrets.COOKIES }}" > cookies.txt
            COOKIE_OPT="--cookies cookies.txt"
          else
            COOKIE_OPT=""
            echo "⚠️ No cookies found, trying without cookies"
          fi
          
          yt-dlp $COOKIE_OPT \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=android,web;player_skip=webpage" \
            -f "best[height<=720]/bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --no-check-certificate \
            "${{ github.event.inputs.url }}"

      - name: Upload files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.mkv *.webm 2>/dev/null || echo "No video files"
          git commit -m "Add video [skip ci]" || echo "Nothing to commit"
          git push
