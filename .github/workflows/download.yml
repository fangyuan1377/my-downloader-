name: YouTube Downloader with Cookies

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          pip install yt-dlp
          yt-dlp --version

      - name: Download video with cookies (enhanced)
        run: |
              echo "${{ secrets.COOKIES }}" > cookies.txt
              yt-dlp --cookies cookies.txt \
                     --extractor-args "youtube:player_client=android,web;player_skip=webpage" \
                     -f "best[height<=720]/best" \
                     --merge-output-format mp4 \
                     --no-check-certificate \
                    "${{ github.event.inputs.url }}"


      - name: Upload to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.webm *.mkv 2>/dev/null || echo "No files to add"
          git commit -m "Add downloaded video [skip ci]" || echo "Nothing to commit"
          git push
