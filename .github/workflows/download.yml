name: YouTube Advanced Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp and dependencies
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Download video
        run: |
          yt-dlp --cookies-from-browser chromium \
                 --format "best[height<=720]/bestvideo+bestaudio/best" \
                 --merge-output-format mp4 \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --extractor-args "youtube:player_client=android,web;player_skip=webpage" \
                 --no-check-certificate \
                 "${{ github.event.inputs.url }}"

      - name: Upload to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.webm *.mkv 2>/dev/null || echo "No files to add"
          git commit -m "Add downloaded file [skip ci]" || echo "Nothing to commit"
          git push
